name: I I E

on:
  schedule:
    # 3 runs per day targeting the best UTC hours from 3-run analysis:
    #   06:00 UTC → covers 06-12 UTC  — hits best hours 7:00, 8:00 (stable 41-43%)
    #   12:00 UTC → covers 12-18 UTC  — hits best hours 12:00, 15:00 (stable 47%, 41%)
    #   21:00 UTC → covers 21-03 UTC  — hits best hours 23:00, 0:00 (stable 35%, 33%)
    #
    # Worst hours avoided:  2:00 UTC (9%), 5:00 UTC (7%), 6:00 UTC (16%), 10-11 UTC (16-18%)
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

concurrency:
  group: iie
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install --no-audit --no-fund --no-update-notifier

      - name: Install Chromium binary
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Chromium system deps
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install-deps chromium

      - name: Run script
        env:
          I_CO:  ${{ secrets.I_CO }}
          M_P:   ${{ secrets.M_P }}
          I_M:   ${{ secrets.I_M }}
          I_U:   ${{ secrets.I_U }}
          I_TZ:  ${{ secrets.I_TZ }}
          I_LC:  ${{ secrets.I_LC }}
          I_O1:  ${{ secrets.I_O1 }}
          I_O2:  ${{ secrets.I_O2 }}
          I_SB:  ${{ secrets.I_SB }}
          I_UA:  ${{ secrets.I_UA }}
          I_FP:  ${{ secrets.I_FP }}
          I_REF: ${{ secrets.I_REF }}
          TZ:    ${{ secrets.I_TZ }}
        run: node script.js
