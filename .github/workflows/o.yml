name: I I E

on:
  schedule:
    - cron: '40 */6 * * *'
  workflow_dispatch:

concurrency:
  group: iie
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install --no-audit --no-fund --no-update-notifier

      - name: Install Chromium binary
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Chromium system deps
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install-deps chromium

      - name: Run script
        env:
          I_CO:  ${{ secrets.I_CO }}
          M_P:   ${{ secrets.M_P }}
          GDR_K: ${{ secrets.GDR_K }}
          GDR_D: ${{ secrets.GDR_D }}
          I_M:   ${{ secrets.I_M }}
          I_U:   ${{ secrets.I_U }}
          I_TZ:  ${{ secrets.I_TZ }}
          I_LC:  ${{ secrets.I_LC }}
          I_O1:  ${{ secrets.I_O1 }}
          I_O2:  ${{ secrets.I_O2 }}
          I_SB:  ${{ secrets.I_SB }}
          TZ:    ${{ secrets.I_TZ }}
        run: node script.js
