name: I I E

on:
  schedule:
    - cron: '40 */5 * * *'
  workflow_dispatch:

concurrency:
  group: iie
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}

      - name: Cache Playwright
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run script
        env:
          I_CO:  ${{ secrets.I_CO }}
          M_P:   ${{ secrets.M_P }}
          GDR_K: ${{ secrets.GDR_K }}
          GDR_D: ${{ secrets.GDR_D }}
          I_M:   ${{ secrets.I_M }}
          I_U:   ${{ secrets.I_U }}
          I_TZ:  ${{ secrets.I_TZ }}
          I_LC:  ${{ secrets.I_LC }}
          I_O1:  ${{ secrets.I_O1 }}
          I_O2:  ${{ secrets.I_O2 }}
          I_SB:  ${{ secrets.I_SB }}
          TZ:    ${{ secrets.I_TZ }}
        run: node script.js
